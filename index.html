<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waggy</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">

  </header>
  <main class="main">
    <section class="hero">
      <div class="container">
      <div class="hero__inner">
        <div class="hero__image">
          <img src="img/Img.png" alt="Dog">
        </div>

        <div class="hero__content">
          <span class="hero__label">SAVE 10 - 20% OFF</span>
          <h1 class="hero__title">
            Best Destination <br>
            For <span>Your Pets</span>
          </h1>
          <button class="btn">SHOP NOW →</button>
        </div>
      </div>
    </div>
    </section>
    <section class="products">
      <div class="products__top">

      </div>
      <div class="products__catalog">

      </div>

    </section>
    <section class="offer">
      <div class="offer__title">Get <span class="text_accent">20% Off</span> on <br>first Purchase
      </div>
      <form class="offer__form">
        <input type="email" placeholder="your email address">
        <input type="text" placeholder="your Full Name">
        <input type="text" placeholder="Message">
        <button type="submit">Send Message</button>
      </form>
    </section>
    <section class="gallery">
      <div class="gallery__grid">
        <img src="img/gallery1.jpg">
        <img src="img/gallery2.png">
        <img src="img/gallery3.png">
        <img src="img/gallery4.jpg">
        <img src="img/gallery5.jpg">
        <img src="img/gallery6.png">
      </div>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__copy">©2026 Waggy. All rights reserved.</p>
    <p class="footer__author">тут ваша фамилия</p>
  </footer>
</body>

</html>
